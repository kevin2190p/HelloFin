# OpenClaw Configuration – HelloFin Voice Phishing Detection
# Alternative WhatsApp webhook handler (n8n is primary orchestrator)

service:
  name: hellofin-openclaw
  version: "1.0.0"

whatsapp:
  # Meta Business API credentials (from .env)
  phone_number_id: "${WHATSAPP_PHONE_NUMBER_ID}"
  access_token: "${WHATSAPP_ACCESS_TOKEN}"
  verify_token: "${WHATSAPP_VERIFY_TOKEN}"
  api_version: "v18.0"

webhook:
  # Listen for incoming WhatsApp messages
  path: /openclaw/webhook
  port: 9000
  events:
    - messages
    - message_status

  # Filter: only process audio/voice messages
  filters:
    message_type:
      - audio
      - voice

  # Forward matching messages to FastAPI backend
  forward:
    url: "http://fastapi:8000/webhook/whatsapp-voice"
    method: POST
    content_type: multipart/form-data
    field_mapping:
      audio: "media_content"        # Downloaded audio binary
      sender_phone: "from"          # Sender's phone number
      is_new_payee: "false"         # Default; override via context
      transaction_amount: "0"

  # Auto-download media before forwarding
  media:
    auto_download: true
    storage_path: "/tmp/openclaw-media"
    max_file_size_mb: 25

# Caregiver alert forwarding
alerts:
  enabled: true
  caregiver_phone: "${CAREGIVER_PHONE_NUMBER}"
  template: |
    ⚠️ HELLOFIN ALERT
    High-risk voice phishing detected!
    Risk Score: {risk_score}/100
    Transaction: {txn_id}
    Transaction is HELD. Open dashboard to review.

logging:
  level: info
  format: json
  output: stdout
