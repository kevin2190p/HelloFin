version: "3.9"

# ============================================================
# HelloFin – Docker Compose (TNG Digital FINHACK 2026)
# Services: FastAPI, Redis, n8n, PostgreSQL (optional)
# ============================================================

services:
  # ----------------------------------------------------------
  # FastAPI Backend
  # ----------------------------------------------------------
  fastapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hellofin-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./audios:/app/audios
      - ./logs:/app/logs
    depends_on:
      - redis
    networks:
      - hellofin-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ----------------------------------------------------------
  # Redis – In-memory store for transactions & risk data
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: hellofin-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass ""
    networks:
      - hellofin-net

  # ----------------------------------------------------------
  # n8n – Workflow orchestration
  # ----------------------------------------------------------
  n8n:
    image: n8nio/n8n:latest
    container_name: hellofin-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-hellofin2026}
      - N8N_HOST=${N8N_HOST:-0.0.0.0}
      - N8N_PORT=5678
      - WEBHOOK_URL=http://n8n:5678/
      - GENERIC_TIMEZONE=Asia/Kuala_Lumpur
    volumes:
      - n8n-data:/home/node/.n8n
      - ./n8n:/home/node/workflows
    depends_on:
      - fastapi
    networks:
      - hellofin-net

  # ----------------------------------------------------------
  # Svelte Frontend (Caregiver Dashboard)
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hellofin-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - fastapi
    networks:
      - hellofin-net

  # ----------------------------------------------------------
  # PostgreSQL (optional – for persistent audit logs)
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: hellofin-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-hellofin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-hellofin_secure_2026}
      - POSTGRES_DB=${POSTGRES_DB:-hellofin_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - hellofin-net
    profiles:
      - with-postgres

volumes:
  redis-data:
  n8n-data:
  pgdata:

networks:
  hellofin-net:
    driver: bridge
